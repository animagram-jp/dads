<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Table</title>
<link rel="stylesheet" href="../../dads-base.css">
<link rel="stylesheet" href="../../components/checkbox/checkbox.css">
<link rel="stylesheet" href="table.css">
<script type="module" src="scroll-shadow.js"></script>
</head>
<body>

<!-- 通常 -->
<div class="dads-table">
  <table class="dads-table__table">
    <thead>
      <tr>
        <th class="dads-table__col-header" scope="col">ラベル</th>
        <th class="dads-table__col-header" scope="col">ラベル</th>
        <th class="dads-table__col-header" scope="col">ラベル</th>
        <th class="dads-table__col-header" scope="col">ラベル</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>データ</td>
        <td>データ</td>
        <td>データ</td>
        <td>データ</td>
      </tr>
      <tr>
        <td>データ</td>
        <td>データ</td>
        <td>データ</td>
        <td>データ</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- スクロールシャドウ付き -->
<div class="dads-table" style="margin-top: 2rem; max-width: 400px;">
  <dads-scroll-shadow style="--scroll-shadow-padding: 0px;">
    <table class="dads-table__table">
      <thead>
        <tr>
          <th class="dads-table__col-header" scope="col">列1</th>
          <th class="dads-table__col-header" scope="col">列2</th>
          <th class="dads-table__col-header" scope="col">列3</th>
          <th class="dads-table__col-header" scope="col">列4</th>
          <th class="dads-table__col-header" scope="col">列5</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>データ1</td>
          <td>データ2</td>
          <td>データ3</td>
          <td>データ4</td>
          <td>データ5</td>
        </tr>
      </tbody>
    </table>
  </dads-scroll-shadow>
</div>

<!-- ストライプ -->
<div class="dads-table" data-row-stripe style="margin-top: 2rem;">
  <table class="dads-table__table" data-cell-border="bottom">
    <thead>
      <tr>
        <th class="dads-table__col-header" scope="col">ラベル</th>
        <th class="dads-table__col-header" scope="col">ラベル</th>
        <th class="dads-table__col-header" scope="col">ラベル</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>データ</td><td>データ</td><td>データ</td></tr>
      <tr><td>データ</td><td>データ</td><td>データ</td></tr>
      <tr><td>データ</td><td>データ</td><td>データ</td></tr>
    </tbody>
  </table>
</div>

</body>
</html>
