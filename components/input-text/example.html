<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Input Text</title>
<link rel="stylesheet" href="../../dads-base.css">
<link rel="stylesheet" href="input-text.css">
</head>
<body>

<!-- 通常 -->
<span class="dads-input-text">
  <input class="dads-input-text__input" type="text" data-size="md" placeholder="テキストを入力">
</span>

<!-- エラー -->
<span class="dads-input-text" style="margin-top:1rem;display:block">
  <input class="dads-input-text__input" type="text" data-size="md" aria-invalid="true" aria-describedby="input-error">
  <span id="input-error" class="dads-input-text__error-text">＊エラーテキストが入ります。</span>
</span>

<!-- 読み取り専用 -->
<span class="dads-input-text" style="margin-top:1rem;display:block">
  <input class="dads-input-text__input" type="text" data-size="md" value="読み取り専用の値" readonly>
</span>

<!-- 無効 -->
<span class="dads-input-text" style="margin-top:1rem;display:block">
  <input class="dads-input-text__input" type="text" data-size="md" value="無効" disabled>
</span>

</body>
</html>
