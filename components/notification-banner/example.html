<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notification Banner</title>
<link rel="stylesheet" href="../../dads-base.css"><!-- notification-banner はアクションボタンに button を使う -->
<link rel="stylesheet" href="../button/button.css">
<link rel="stylesheet" href="notification-banner.css">
</head>
<body>

<!-- エラー -->
<div class="dads-notification-banner" data-style="standard" data-type="error">
  <h2 class="dads-notification-banner__heading">
    <svg class="dads-notification-banner__icon" width="24" height="24" viewBox="0 0 24 24" role="img" aria-label="エラー">
      <path d="M8.25 21 3 15.75v-7.5L8.25 3h7.5L21 8.25v7.5L15.75 21h-7.5Z" fill="currentcolor"/>
      <path d="m12 13.4-2.85 2.85-1.4-1.4L10.6 12 7.75 9.15l1.4-1.4L12 10.6l2.85-2.85 1.4 1.4L13.4 12l2.85 2.85-1.4 1.4L12 13.4Z" fill="Canvas"/>
    </svg>
    <span class="dads-notification-banner__heading-text">操作を完了できませんでした</span>
  </h2>
  <button class="dads-notification-banner__close" type="button">
    <svg class="dads-notification-banner__close-icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
      <path d="m6.4 18.6-1-1 5.5-5.6-5.6-5.6 1.1-1 5.6 5.5 5.6-5.6 1 1.1L13 12l5.6 5.6-1 1L12 13l-5.6 5.6Z" fill="currentcolor"/>
    </svg>
    <span class="dads-notification-banner__close-label">閉じる</span>
  </button>
  <div class="dads-notification-banner__body">
    <p>入力内容を確認して再度お試しください。</p>
  </div>
  <div class="dads-notification-banner__actions">
    <button class="dads-button" data-size="md" data-type="outline">キャンセル</button>
    <button class="dads-button" data-size="md" data-type="solid-fill">再試行</button>
  </div>
</div>

<!-- 成功 -->
<div class="dads-notification-banner" data-style="standard" data-type="success" style="margin-top:1rem">
  <h2 class="dads-notification-banner__heading">
    <svg class="dads-notification-banner__icon" width="24" height="24" viewBox="0 0 24 24" role="img" aria-label="成功">
      <circle cx="12" cy="12" r="9" fill="currentcolor"/>
      <path d="m10 13.4-2.1-2.1-1.4 1.4L10 16.2l7.5-7.5-1.4-1.4L10 13.4Z" fill="Canvas"/>
    </svg>
    <span class="dads-notification-banner__heading-text">送信が完了しました</span>
  </h2>
  <button class="dads-notification-banner__close" type="button">
    <svg class="dads-notification-banner__close-icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
      <path d="m6.4 18.6-1-1 5.5-5.6-5.6-5.6 1.1-1 5.6 5.5 5.6-5.6 1 1.1L13 12l5.6 5.6-1 1L12 13l-5.6 5.6Z" fill="currentcolor"/>
    </svg>
    <span class="dads-notification-banner__close-label">閉じる</span>
  </button>
  <div class="dads-notification-banner__body">
    <p>申請内容を受け付けました。</p>
  </div>
</div>

<!-- 警告 -->
<div class="dads-notification-banner" data-style="standard" data-type="warning" style="margin-top:1rem">
  <h2 class="dads-notification-banner__heading">
    <svg class="dads-notification-banner__icon" width="24" height="24" viewBox="0 0 24 24" role="img" aria-label="警告">
      <path d="M2.7 21 12 4.5 21.3 21H2.7Z" fill="currentcolor"/>
      <path d="M11 10h2v5h-2zm0 6h2v2h-2z" fill="Canvas"/>
    </svg>
    <span class="dads-notification-banner__heading-text">入力内容に注意が必要です</span>
  </h2>
  <button class="dads-notification-banner__close" type="button">
    <svg class="dads-notification-banner__close-icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
      <path d="m6.4 18.6-1-1 5.5-5.6-5.6-5.6 1.1-1 5.6 5.5 5.6-5.6 1 1.1L13 12l5.6 5.6-1 1L12 13l-5.6 5.6Z" fill="currentcolor"/>
    </svg>
    <span class="dads-notification-banner__close-label">閉じる</span>
  </button>
  <div class="dads-notification-banner__body">
    <p>入力期限が近づいています。</p>
  </div>
</div>

</body>
</html>
